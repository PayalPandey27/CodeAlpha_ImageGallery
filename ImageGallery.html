<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Image Gallery</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111;
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 2.5rem;
    }

    /* Filter Buttons */
    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .filters button {
      padding: 10px 18px;
      border: none;
      background: #222;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .filters button:hover,
    .filters button.active {
      background: #ff9800;
      transform: scale(1.05);
    }

    /* Gallery Layout */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.4s ease;
    }

    .gallery-item img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease, filter 0.5s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.1);
      filter: brightness(70%);
    }

    .gallery-item .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 15px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: white;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .gallery-item:hover .overlay {
      opacity: 1;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      flex-direction: column;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 80vh;
      border-radius: 10px;
      animation: zoom 0.3s ease;
    }

    @keyframes zoom {
      from {
        transform: scale(0.7);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .close,
    .prev,
    .next {
      position: absolute;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      user-select: none;
      transition: 0.3s;
    }

    .close:hover,
    .prev:hover,
    .next:hover {
      color: #ff9800;
    }

    .close {
      top: 20px;
      right: 30px;
    }

    .prev {
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
    }

    .next {
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }

      .gallery-item img {
        height: 220px;
      }

      .prev,
      .next {
        font-size: 1.5rem;
      }
    }

    @media (max-width: 480px) {
      .gallery-item img {
        height: 180px;
      }

      .filters button {
        padding: 8px 14px;
      }
    }
  </style>
</head>
<body>

  <h1>Image Gallery</h1>

  <!-- Filter Buttons -->
  <div class="filters">
  <button class="active" data-filter="all">All</button>
  <button data-filter="india">India</button>
  <button data-filter="japan">Japan</button>
  <button data-filter="china">China</button>
</div>

  <!-- Gallery -->
  <div class="gallery">

  <!-- India -->
<div class="gallery-item" data-category="india">
  <img src="https://www.originaltravel.co.uk/img/mag/201602/istock-1218830644body.jpg" alt="India">
  <div class="overlay">India</div>
</div>

<div class="gallery-item" data-category="india">
  <img src="https://cdn.mos.cms.futurecdn.net/3FnczamRyWU6MvRMEXWaGD-1280-80.jpg.webp" alt="India">
  <div class="overlay">India</div>
</div>

  <!-- Japan -->
<div class="gallery-item" data-category="japan">
  <img src="https://www.travelandleisure.com/thmb/8YAe9x5lVSo1N35JHcgcMtYbRtE=/750x0/filters:no_upscale():max_bytes(150000):strip_icc():format(webp)/yamanashi-lake-kawaguchi_BEAUJAPAN0223-cdf97f7e53a44b23ab38eaf8cb7574d7.jpg" alt="Japan">
  <div class="overlay">Japan</div>
</div>

<div class="gallery-item" data-category="japan">
  <img src="https://www.trafalgar.com/real-word/wp-content/uploads/2018/01/Tokyo-Skyline-www.istockphoto.com_gb_photo_tokyo-japan-city-skyline-gm504317383-44289846-SeanPavonePhoto-2048x1365.jpg" alt="Japan">
  <div class="overlay">Japan</div>
</div>
  

 <!-- China -->
<div class="gallery-item" data-category="china">
  <img src="https://whc.unesco.org/uploads/thumbs/site_0438_0035-1000-579-20251217144955.jpg" alt="China">
  <div class="overlay">China</div>
</div>

<div class="gallery-item" data-category="china">
  <img src="https://lsj.com.au/wp-content/uploads/2019/01/HK_FeatureImage-1180x560.jpg" alt="China">
  <div class="overlay">China</div>
</div>

</div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <span class="prev">&#10094;</span>
    <img id="lightbox-img" src="" alt="">
    <span class="next">&#10095;</span>
  </div>

  <script>
    const galleryItems = document.querySelectorAll(".gallery-item");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    const closeBtn = document.querySelector(".close");
    const nextBtn = document.querySelector(".next");
    const prevBtn = document.querySelector(".prev");

    let currentIndex = 0;
    let visibleItems = [...galleryItems];

    // Open Lightbox
    galleryItems.forEach((item, index) => {
      item.addEventListener("click", () => {
        currentIndex = visibleItems.indexOf(item);
        showImage();
        lightbox.style.display = "flex";
      });
    });

    function showImage() {
      const img = visibleItems[currentIndex].querySelector("img");
      lightboxImg.src = img.src;
    }

    // Next Image
    nextBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % visibleItems.length;
      showImage();
    });

    // Previous Image
    prevBtn.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + visibleItems.length) % visibleItems.length;
      showImage();
    });

    // Close Lightbox
    closeBtn.addEventListener("click", () => {
      lightbox.style.display = "none";
    });

    // Close when clicking outside image
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) {
        lightbox.style.display = "none";
      }
    });

    // Filter Functionality
    const filterButtons = document.querySelectorAll(".filters button");

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {

        document
          .querySelector(".filters .active")
          .classList.remove("active");

        button.classList.add("active");

        const filter = button.dataset.filter;

        visibleItems = [];

        galleryItems.forEach(item => {
          if (
            filter === "all" ||
            item.dataset.category === filter
          ) {
            item.style.display = "block";
            visibleItems.push(item);
          } else {
            item.style.display = "none";
          }
        });
      });
    });

    // Keyboard Navigation
    document.addEventListener("keydown", (e) => {
      if (lightbox.style.display === "flex") {
        if (e.key === "ArrowRight") {
          nextBtn.click();
        }
        if (e.key === "ArrowLeft") {
          prevBtn.click();
        }
        if (e.key === "Escape") {
          closeBtn.click();
        }
      }
    });
  </script>

</body>
</html>
